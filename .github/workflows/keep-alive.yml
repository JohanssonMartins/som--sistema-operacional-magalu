name: Keep-Alive Render

on:
  schedule:
    - cron: '*/12 * * * *' # Roda a cada 12 minutos (limite de inatividade do Render é 15 min)
  workflow_dispatch: # Permite rodar manualmente pelo painel do GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Pulsar o Backend do Render
        run: |
          echo "Enviando sinal de vida para o Render..."
          curl -s https://som-sistema-operacional-magalu.onrender.com/api/users > /dev/null
          echo "Sinal enviado com sucesso!"
